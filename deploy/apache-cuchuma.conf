<VirtualHost *:80>
    ServerName cuchuma.bonsanbec.dev
    RewriteEngine On
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName cuchuma.bonsanbec.dev

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ErrorLog ${APACHE_LOG_DIR}/cuchuma-error.log
    CustomLog ${APACHE_LOG_DIR}/cuchuma-access.log combined

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/cuchuma.bonsanbec.dev/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/cuchuma.bonsanbec.dev/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
